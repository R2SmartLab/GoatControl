start_area:
  name: Start GOAT area
  description: Start the Ecovacs GOAT mower in a specific saved area.
  fields:
    area:
      name: Mähfläche
      description: Selected GOAT area name; GoatControl converts it to the Ecovacs area ID before sending the command.
      example: "Mähfläche 1"
      required: true
      selector:
        select:
          options:
            - label: Mähfläche 1
              value: Mähfläche 1
            - label: Mähfläche 2
              value: Mähfläche 2
    entity_id:
      name: Entity ID
      description: Lawn mower entity to control.
      example: "lawn_mower.mahhcedes"
      required: false
      selector:
        text: {}
